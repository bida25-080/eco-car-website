<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Ferrari Gallery - Stunning high-resolution images of legendary Ferraris.">
    <title>Gallery | Visual Heritage</title>
    <!-- Bootstrap 5.3 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <!-- AOS Library -->
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/style.css">
    <style>
        .gallery-item {
            position: relative;
            overflow: hidden;
            border-radius: 4px;
            border: 1px solid var(--glass-border);
            margin-bottom: 24px;
            cursor: pointer;
        }
        .gallery-item img {
            width: 100%;
            height: 400px;
            object-fit: cover;
            transition: var(--transition-premium);
        }
        .gallery-item:hover img {
            transform: scale(1.1);
            filter: brightness(0.7);
        }
        .gallery-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: var(--transition-premium);
            background: rgba(212, 0, 0, 0.4);
        }
        .gallery-item:hover .gallery-overlay {
            opacity: 1;
        }
    </style>
</head>
<body>

    <!-- Premium Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark fixed-top">
        <div class="container">
            <a class="navbar-brand" href="index.html">
                <img src="https://pngimg.com/uploads/ferrari/ferrari_PNG102798.png" alt="Ferrari Logo">
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
                    <li class="nav-item"><a class="nav-link" href="showcase.html">Showcase</a></li>
                    <li class="nav-item"><a class="nav-link active" href="gallery.html">Gallery</a></li>
                    <li class="nav-item"><a class="nav-link" href="about.html">About</a></li>
                    <li class="nav-item"><a class="nav-link" href="feedback.html">Feedback</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Header Section -->
    <section class="section-padding bg-dark text-center" style="margin-top: 80px; background: linear-gradient(to bottom, #050505, #111);">
        <div class="container" data-aos="fade-down">
            <h1 class="section-title">THE GALLERY</h1>
            <p class="lead text-secondary">Capturing the beauty of Maranello's finest creations.</p>
        </div>
    </section>

    <!-- Gallery Grid -->
    <section class="section-padding pt-0">
        <div class="container">
            <div class="row">
                
                <div class="col-md-6 col-lg-4" data-aos="zoom-in" data-aos-delay="100">
                    <div class="gallery-item">
                        <img src="images/hero.png" alt="Ferrari SF90">
                        <div class="gallery-overlay">
                            <span class="text-white fw-bold">SF90 STRADALE</span>
                        </div>
                    </div>
                </div>

                <div class="col-md-6 col-lg-8" data-aos="zoom-in" data-aos-delay="200">
                    <div class="gallery-item">
                        <img src="https://images.unsplash.com/photo-1592198084033-aade902d1aae?q=80&w=2070&auto=format&fit=crop" alt="Ferrari F8">
                        <div class="gallery-overlay">
                            <span class="text-white fw-bold">F8 TRIBUTO</span>
                        </div>
                    </div>
                </div>

                <div class="col-md-6 col-lg-4" data-aos="zoom-in" data-aos-delay="300">
                    <div class="gallery-item">
                        <img src="https://images.unsplash.com/photo-1621135802920-133df287f89c?q=80&w=2070&auto=format&fit=crop" alt="Ferrari Yellow">
                        <div class="gallery-overlay">
                            <span class="text-white fw-bold">MODENA YELLOW</span>
                        </div>
                    </div>
                </div>

                <div class="col-md-6 col-lg-4" data-aos="zoom-in" data-aos-delay="400">
                    <div class="gallery-item">
                        <img src="https://images.unsplash.com/photo-1571607388333-94c676af562a?q=80&w=1974&auto=format&fit=crop" alt="Ferrari Classic">
                        <div class="gallery-overlay">
                            <span class="text-white fw-bold">CLASSIC HERITAGE</span>
                        </div>
                    </div>
                </div>

                <div class="col-md-6 col-lg-4" data-aos="zoom-in" data-aos-delay="500">
                    <div class="gallery-item">
                        <img src="https://images.unsplash.com/photo-1583121274602-3e2820c69888?q=80&w=2070&auto=format&fit=crop" alt="Ferrari Detail">
                        <div class="gallery-overlay">
                            <span class="text-white fw-bold">PRANCING HORSE</span>
                        </div>
                    </div>
                </div>

                <div class="col-md-12 col-lg-12" data-aos="zoom-in" data-aos-delay="600">
                    <div class="gallery-item" style="height: 500px;">
                        <img src="https://images.unsplash.com/photo-1614162485128-e4ec99c436d7?q=80&w=2070&auto=format&fit=crop" alt="Ferrari Collection" style="height: 500px;">
                        <div class="gallery-overlay">
                            <span class="text-white fw-bold">THE ULTIMATE COLLECTION</span>
                        </div>
                    </div>
                </div>

            </div>
        </div>
    </section>

    <!-- Footer -->
    <footer>
        <div class="container text-center">
            <img src="https://pngimg.com/uploads/ferrari/ferrari_PNG102798.png" alt="Ferrari" class="footer-logo">
            <div class="social-links">
                <a href="#"><i class="fab fa-facebook-f"></i></a>
                <a href="#"><i class="fab fa-instagram"></i></a>
                <a href="#"><i class="fab fa-twitter"></i></a>
                <a href="#"><i class="fab fa-youtube"></i></a>
            </div>
            <p class="text-muted small mt-4">&copy; 2026 Ferrari Tribute Project. All rights reserved.</p>
        </div>
    </footer>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>
        AOS.init({
            duration: 1000,
            once: true,
            offset: 100
        });
    </script>
</body>
</html>
